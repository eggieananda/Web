<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Facebook Style</title>

  <!-- SweetAlert -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    /* CSS dari saya tadi taruh di sini */
    body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f0f2f5;
}

/* Layout utama */
.main {
  display: flex;
  height: 100vh;
}

/* KIRI */
.left {
  flex: 1;
  padding: 100px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.logo {
  color: #1877f2;
  font-size: 50px;
  font-weight: bold;
}

.tagline {
  font-size: 28px;
  margin-top: 10px;
}

.tagline span {
  color: #1877f2;
}

/* KANAN */
.right {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  width: 350px;
  background: white;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  text-align: center;
}

.login-box h3 {
  margin-bottom: 15px;
}

/* Input */
input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: 1px solid #ddd;
  border-radius: 6px;
}

/* Tombol login */
#loginBtn {
  width: 100%;
  padding: 12px;
  background: #1877f2;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
}

#loginBtn:hover {
  background: #166fe5;
}

/* Lupa password */
.forgot {
  color: #1877f2;
  font-size: 14px;
  cursor: pointer;
}

/* Garis */
hr {
  margin: 15px 0;
}

/* Tombol daftar */
.create {
  width: 100%;
  padding: 12px;
  background: white;
  color: #1877f2;
  border: 1px solid #1877f2;
  border-radius: 25px;
  cursor: pointer;
}

.create:hover {
  background: #f0f2f5;
}

/* Meta */
.meta {
  margin-top: 10px;
  font-size: 12px;
  color: gray;
}
  </style>
</head>

<body>

  <!-- ISI BODY (kode yang tadi) -->
  <div class="main">
    
    <div class="left">
      <div class="logo">facebook</div>
      <p class="tagline">Explore the things <span>you love.</span></p>
    </div>

    <div class="right">
      <div class="login-box">
        <h3>Log in to Facebook</h3>
        
        <input type="text" id="email" placeholder="Email address or mobile number">
        <input type="password" id="password" placeholder="Password">

        <button id="loginBtn">Log in</button>

        <p class="forgot">Forgotten password?</p>

        <hr>

        <button class="create">Create new account</button>

        <p class="meta">Meta</p>
      </div>
    </div>

  </div>

  <!-- SCRIPT FIREBASE (tetap sama, jangan diubah) -->
  <script type="module">
    // kode firebase + sweetalert kamu
  </script>

</body>
</html>
